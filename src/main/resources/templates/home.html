<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clinic Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">Clinic Appointment</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" th:href="@{/register}" sec:authorize="isAnonymous()">Register</a>
            <a class="btn btn-outline-light btn-sm" th:href="@{/login}" sec:authorize="isAnonymous()">Login</a>
            <a class="btn btn-warning btn-sm" th:href="@{/admin/doctors}" sec:authorize="hasRole('ADMIN')">Admin</a>
            <a class="btn btn-info btn-sm" th:href="@{/my-appointments}" sec:authorize="hasRole('PATIENT')">My Appointments</a>
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                <button class="btn btn-danger btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h2 class="mb-3">Doctor List</h2>
    <div class="row g-2 mb-4">
        <div class="col-md-9">
            <input id="searchInput" class="form-control" type="text" placeholder="Search doctor name..."
                   th:value="${keyword}">
        </div>
        <div class="col-md-3">
            <button id="searchBtn" class="btn btn-primary w-100" type="button">Search Ajax</button>
        </div>
    </div>

    <div id="doctorCards" class="row g-3">
        <div class="col-md-4" th:each="doctor : ${doctorPage.content}">
            <div class="card h-100 shadow-sm">
                <img th:src="${doctor.image}" class="card-img-top" alt="doctor-image" style="height:220px;object-fit:cover;">
                <div class="card-body">
                    <h5 class="card-title" th:text="${doctor.name}"></h5>
                    <p class="mb-1"><strong>Specialty:</strong> <span th:text="${doctor.specialty}"></span></p>
                    <p class="mb-2"><strong>Department:</strong> <span th:text="${doctor.department.name}"></span></p>
                    <a sec:authorize="hasRole('PATIENT')" th:href="@{'/enroll/' + ${doctor.id}}" class="btn btn-success btn-sm">Dat lich</a>
                </div>
            </div>
        </div>
    </div>

    <nav class="mt-4" th:if="${doctorPage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${doctorPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/home(page=${doctorPage.number - 1}, keyword=${keyword})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, doctorPage.totalPages - 1)}"
                th:classappend="${i == doctorPage.number} ? 'active'">
                <a class="page-link" th:href="@{/home(page=${i}, keyword=${keyword})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${doctorPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/home(page=${doctorPage.number + 1}, keyword=${keyword})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<script>
    function renderDoctors(doctors) {
        const container = document.getElementById('doctorCards');
        if (!doctors.length) {
            container.innerHTML = '<div class="col-12"><div class="alert alert-warning">Khong tim thay bac si.</div></div>';
            return;
        }
        container.innerHTML = doctors.map(d => `
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <img src="${d.image}" class="card-img-top" alt="doctor-image" style="height:220px;object-fit:cover;">
                    <div class="card-body">
                        <h5 class="card-title">${d.name}</h5>
                        <p class="mb-1"><strong>Specialty:</strong> ${d.specialty}</p>
                        <p class="mb-2"><strong>Department:</strong> ${d.department}</p>
                        <a href="/enroll/${d.id}" class="btn btn-success btn-sm">Dat lich</a>
                    </div>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('searchBtn').addEventListener('click', async function () {
        const keyword = document.getElementById('searchInput').value || '';
        const res = await fetch(`/api/doctors/search?keyword=${encodeURIComponent(keyword)}`);
        const data = await res.json();
        renderDoctors(data);
    });
</script>
</body>
</html>
