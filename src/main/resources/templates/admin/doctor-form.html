<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doctor Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h3 th:text="${doctor.id == null ? 'Create Doctor' : 'Update Doctor'}"></h3>
    <form th:action="${doctor.id == null} ? @{/admin/doctors/create} : @{'/admin/doctors/edit/' + ${doctor.id}}" method="post" th:object="${doctor}">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input class="form-control" th:field="*{name}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input class="form-control" th:field="*{image}">
        </div>
        <div class="mb-3">
            <label class="form-label">Specialty</label>
            <input class="form-control" th:field="*{specialty}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Department</label>
            <select class="form-select" name="departmentId">
                <option th:each="dep : ${departments}" th:value="${dep.id}" th:text="${dep.name}"
                        th:selected="${doctor.department != null and doctor.department.id == dep.id}"></option>
            </select>
        </div>
        <button class="btn btn-success" type="submit">Save</button>
        <a class="btn btn-secondary" th:href="@{/admin/doctors}">Cancel</a>
    </form>
</div>
</body>
</html>
