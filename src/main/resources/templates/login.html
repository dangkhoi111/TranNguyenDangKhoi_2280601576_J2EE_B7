<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="mb-3">Login</h4>
                    <div class="alert alert-success" th:if="${param.registered}">Dang ky thanh cong, vui long dang nhap.</div>
                    <div class="alert alert-danger" th:if="${param.error}">Sai username/password.</div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Login</button>
                    </form>
                    <a class="btn btn-outline-danger w-100 mt-2" th:href="@{/oauth2/authorization/google}">Login with Google</a>
                    <a class="btn btn-link mt-2" th:href="@{/register}">Chua co tai khoan? Dang ky</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
