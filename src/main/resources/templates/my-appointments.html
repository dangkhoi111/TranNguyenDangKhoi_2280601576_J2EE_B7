<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h3 class="mb-3">My Appointments</h3>
    <div class="alert alert-success" th:if="${param.success}">Dat lich thanh cong.</div>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Doctor Name</th>
            <th>Appointment Date</th>
            <th>Department</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(appointments)}">
            <td colspan="3" class="text-center">Chua co lich kham</td>
        </tr>
        <tr th:each="a : ${appointments}">
            <td th:text="${a.doctor.name}"></td>
            <td th:text="${a.appointmentDate}"></td>
            <td th:text="${a.doctor.department.name}"></td>
        </tr>
        </tbody>
    </table>
    <a class="btn btn-primary" th:href="@{/home}">Back Home</a>
</div>
</body>
</html>
