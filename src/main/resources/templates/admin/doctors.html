<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Doctors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h3>Doctor CRUD (ADMIN)</h3>
    <a class="btn btn-success mb-3" th:href="@{/admin/doctors/create}">Create Doctor</a>
    <table class="table table-striped table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Specialty</th>
            <th>Department</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="d : ${doctors}">
            <td th:text="${d.id}"></td>
            <td th:text="${d.name}"></td>
            <td th:text="${d.specialty}"></td>
            <td th:text="${d.department != null ? d.department.name : ''}"></td>
            <td>
                <a class="btn btn-primary btn-sm" th:href="@{'/admin/doctors/edit/' + ${d.id}}">Edit</a>
                <form th:action="@{'/admin/doctors/delete/' + ${d.id}}" method="post" style="display:inline;">
                    <button class="btn btn-danger btn-sm" type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <a class="btn btn-secondary" th:href="@{/home}">Back Home</a>
</div>
</body>
</html>
