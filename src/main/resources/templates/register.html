<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="mb-3">Patient Registration</h4>
                    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
                    <form th:action="@{/register}" method="post" th:object="${registerRequest}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input th:field="*{username}" class="form-control" required>
                            <div class="text-danger small" th:errors="*{username}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" th:field="*{password}" class="form-control" required>
                            <div class="text-danger small" th:errors="*{password}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" required>
                            <div class="text-danger small" th:errors="*{email}"></div>
                        </div>
                        <button class="btn btn-success w-100" type="submit">Register</button>
                    </form>
                    <a class="btn btn-link mt-2" th:href="@{/login}">Da co tai khoan? Dang nhap</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
