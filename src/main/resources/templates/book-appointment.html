<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="mb-2">Dat lich kham</h4>
                    <p><strong>Bac si:</strong> <span th:text="${doctor.name}"></span></p>
                    <p><strong>Khoa:</strong> <span th:text="${doctor.department.name}"></span></p>
                    <form th:action="@{'/enroll/' + ${doctor.id}}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Ngay kham</label>
                            <input type="date" name="appointmentDate" class="form-control" required>
                        </div>
                        <button class="btn btn-primary" type="submit">Xac nhan dat lich</button>
                        <a class="btn btn-secondary" th:href="@{/home}">Quay lai</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
